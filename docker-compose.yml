services:

  postgres-db:
    image: postgres:16-alpine
    container_name: hestia-db
    environment:
      POSTGRES_USER: oumaima
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hestia_booking
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: hestia-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  minio_data:
